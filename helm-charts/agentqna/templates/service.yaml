apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentqna.fullname" . }}
  labels:
    {{- include "agentqna.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: agentqna
  selector:
    {{- include "agentqna.selectorLabels" . | nindent 4 }}
